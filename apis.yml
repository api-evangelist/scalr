aid: scalr
name: Scalr
description: >-
  Scalr is an enterprise-grade, drop-in replacement for Terraform Cloud and a remote
  Terraform operations backend that provides cost estimation, policy enforcement, and
  collaborative infrastructure management. Scalr features a hierarchical account-environment-workspace
  model, full compatibility with the TFC API and Terraform/OpenTofu CLI, OIDC authentication,
  GitOps workflows, OPA policy enforcement, and a comprehensive REST API for managing
  infrastructure as code operations at scale.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - FinOps
  - GitOps
  - Infrastructure as Code
  - Kubernetes
  - OPA
  - OpenTofu
  - Policy
  - Terraform
