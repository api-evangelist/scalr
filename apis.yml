apis:
  - aid: scalr:scalr-user-api
    name: Scalr User API
    description: >-
      The Scalr User API provides programmatic access to user-level resources including
      farms, farm roles, servers, events, cloud locations, cost centers, and scaling
      metrics. This is the legacy cloud management API (v1beta0) for managing cloud
      infrastructure resources across multiple cloud providers.
    humanURL: https://api-explorer.scalr.com/
    tags:
      - Cloud Management
      - Farms
      - Infrastructure
      - Scalr
      - Servers
    properties:
      - type: Documentation
        url: https://api-explorer.scalr.com/
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/scalr/refs/heads/main/openapi/scalr-user-openapi.yml
  - aid: scalr:scalr-account-api
    name: Scalr Account API
    description: >-
      The Scalr Account API provides programmatic access to account-level resources
      including environments, roles, images, orchestration rules, and account-wide
      configuration. This is the legacy cloud management API (v1beta0).
    humanURL: https://api-explorer.scalr.com/
    tags:
      - Account Management
      - Cloud Management
      - Environments
      - Roles
      - Scalr
    properties:
      - type: Documentation
        url: https://api-explorer.scalr.com/
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/scalr/refs/heads/main/openapi/scalr-account-openapi.yml
  - aid: scalr:scalr-global-api
    name: Scalr Global API
    description: >-
      The Scalr Global API provides programmatic access to global-level resources
      including images and roles that span the entire Scalr installation.
    humanURL: https://api-explorer.scalr.com/
    tags:
      - Cloud Management
      - Global
      - Images
      - Roles
      - Scalr
    properties:
      - type: Documentation
        url: https://api-explorer.scalr.com/
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/scalr/refs/heads/main/openapi/scalr-global-openapi.yml
  - aid: scalr:scalr-iac-api
    name: Scalr IaC Management API
    description: >-
      The Scalr IaC Management API (TFC-compatible) provides programmatic control over
      workspaces, environments, runs, state, variables, policies, and provider configurations.
      Fully compatible with Terraform Cloud API and Terraform/OpenTofu CLI. Authenticates
      using Bearer tokens (personal or service account). Supports OIDC for GitHub, GitLab,
      AWS, Azure, and other identity providers.
    humanURL: https://docs.scalr.io/reference/overview-1
    tags:
      - Infrastructure as Code
      - OpenTofu
      - Policy
      - Runs
      - Scalr
      - Terraform
      - Workspaces
