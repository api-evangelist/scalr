specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Scalr
providerId: scalr
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Infrastructure as Code
  - Terraform
  - OpenTofu
  - GitOps
description: Scalr is a Terraform / OpenTofu remote operations and policy platform priced
  primarily on Terraform "runs" per month, with all features (unlimited users, environments,
  agents, concurrency, drift detection, OPA policy) included on every plan. The Business
  plan is self-service with a free tier; the Enterprise plan is contract-priced starting
  at 20,000 runs annually.
sources:
  - https://www.scalr.com/pricing
plans:
  - id: scalr-business
    name: Business
    type: usage-based
    description: Self-service plan billed on Terraform runs per month. Includes a 50 runs/month
      free tier; volume discounts apply at scale. Annual billing also available.
    entries:
      - label: Free Tier
        name: free_runs
        type: quota
        metric: run
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Additional Runs
        name: additional_runs
        type: metered
        metric: run
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.scalr.com/pricing
        userMultiplied: false
    elements:
      - name: Unlimited users
      - name: Unlimited environments
      - name: Unlimited concurrency
      - name: Unlimited self-hosted agents
      - name: Drift detection
      - name: OPA policy
      - name: GitOps workflow
      - name: REST API
  - id: scalr-enterprise
    name: Enterprise
    type: enterprise
    description: Annual contract starting at 20,000 runs/year with all Business features
      plus dedicated CPU / memory, dedicated technical account manager, and Slack shared-channel
      support. Custom pricing.
    entries:
      - label: Annual Run Commitment
        name: annual_runs
        type: subscription
        metric: run
        limit: 20000
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Business features
      - name: Dedicated technical account manager
      - name: Slack shared channel support
      - name: Higher dedicated CPU / memory
      - name: Volume pricing
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
