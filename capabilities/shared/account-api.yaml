naftiko: "1.0.0-alpha1"

info:
  label: "Scalr Account API"
  description: "Manage Scalr account-level resources including environments, cloud credentials, roles, images, and global variables via the v1beta0 cloud management API."
  tags:
    - Account Management
    - Cloud Management
    - Environments
    - Roles
    - Scalr
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCALR_API_KEY: SCALR_API_KEY
      SCALR_ACCOUNT: SCALR_ACCOUNT

capability:
  consumes:
    - type: http
      namespace: scalr-account
      baseUri: https://my.scalr.com/api/v1beta0/account
      description: "Scalr Account API for account-level resource management"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{SCALR_API_KEY}}"
        placement: header
      resources:
        - name: environments
          path: /{accountId}/environments
          description: "Environment management"
          operations:
            - name: list-environments
              method: GET
              description: "List Environments"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-environment
              method: POST
              description: "Create Environment"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
        - name: environment
          path: /{accountId}/environments/{envId}
          description: "Manage a specific environment"
          operations:
            - name: get-environment
              method: GET
              description: "Get Environment"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: envId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-environment
              method: DELETE
              description: "Delete Environment"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: envId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cloud-credentials
          path: /{accountId}/cloud-credentials
          description: "Cloud credential management"
          operations:
            - name: list-cloud-credentials
              method: GET
              description: "List Cloud Credentials"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: roles
          path: /{accountId}/roles
          description: "Role management"
          operations:
            - name: list-roles
              method: GET
              description: "List Roles"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: images
          path: /{accountId}/images
          description: "Image management"
          operations:
            - name: list-account-images
              method: GET
              description: "List Images"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8120
      namespace: scalr-account-rest
      resources:
        - path: /v1/environments
          name: environments
          operations:
            - method: GET
              name: list-environments
              description: "List Scalr environments"
              call: "scalr-account.list-environments"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9120
      namespace: scalr-account-mcp
      transport: http
      tools:
        - name: list-environments
          description: "List Scalr environments within an account"
          hints:
            readOnly: true
            openWorld: true
          call: "scalr-account.list-environments"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-cloud-credentials
          description: "List cloud provider credentials configured in Scalr"
          hints:
            readOnly: true
            openWorld: true
          call: "scalr-account.list-cloud-credentials"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-roles
          description: "List roles defined in Scalr account"
          hints:
            readOnly: true
            openWorld: true
          call: "scalr-account.list-roles"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
