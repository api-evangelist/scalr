        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Associate or replace Cloud Credentials with this Environment for the given Cloud.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cloudCredentialsForeignKeyObject
          in: body
