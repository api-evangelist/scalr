        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get
        method: GET
        description: Retrieve detailed information about a given Event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch
        method: PATCH
        description: Modify the attributes of an Event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventObject
          in: body
          type: string
          description: The JSON representation of a Event object.
          required: true
