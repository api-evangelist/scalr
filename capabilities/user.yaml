        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: envId-events
      path: /{envId}/events/
      operations:
      - name: get
        method: GET
        description: List all the Events available in this Environment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a new Custom Event in this Environment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventObject
          in: body
          type: string
          description: The JSON representation of a Event object.
          required: true
    - name: envId-events-eventId
