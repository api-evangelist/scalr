definitions:
  Environment:
    properties:
      added:
        format: date-time
        readOnly: true
        type: string
      costCenter:
        $ref: '#/definitions/CostCenterForeignKey'
      id:
        readOnly: true
        type: integer
      name:
        type: string
      status:
        enum:
        - active
        - inactive
        type: string
      type:
        default: cmp
        enum:
        - cmp
        - iacp
        type: string
    required:
    - name
    x-createOnly:
    - type
    x-filterable:
    - id
    - name
    - added
    - status
    - type
    - costCenter
    x-usedIn:
    - /account/{accountId}/environments/
    - /account/{accountId}/environments/{envId}/
  CloudstackCloudCredentials:
    properties:
      apiKey:
        description: The API key.
        type: string
      apiUrl:
        description: 'The URL like: http(s)://<cloudstack_ip>:<cloudstack_port>/client/api.'
        type: string
      cloudCredentialsType:
        description: The Cloud Platform these credentials allow access to.
        enum:
        - AwsCloudCredentials
        - GceCloudCredentials
        - AzureCloudCredentials
        - CloudstackCloudCredentials
        - OpenstackCloudCredentials
        - RackspaceCloudCredentials
        - VmwareCloudCredentials
        type: string
      description:
        type: string
      id:
        description: Unique identifier for this Cloud Credentials object.
        maxLength: 12
        minLength: 12
        pattern: '[A-Fa-f0-9]+'
        readOnly: true
        type: string
      name:
        description: Unique name of these Cloud Credentials.
        type: string
      provider:
        description: Cloud provider that should be specified for CloudStack based clouds.
        enum:
        - cloudstack
        - idcf
        type: string
      scope:
        description: The scope in which these Cloud Credentials were added.
        enum:
        - scalr
        - account
        - environment
        - farm
        - farmrole
        - role
        - server
        readOnly: true
        type: string
      secretKey:
        description: The secret key.
        type: string
      status:
        description: The status of these Cloud Credentials.
        enum:
        - disabled
        - enabled
        - suspended
        readOnly: true
        type: string
    required:
    - name
    - cloudCredentialsType
    - provider
    - apiUrl
    - apiKey
    - secretKey
    x-abstractType:
      $ref: '#/definitions/CloudCredentials'
    x-createOnly:
    - cloudCredentialsType
    - provider
    - provider
    x-discriminator: cloudCredentialsType
    x-filterable:
    - id
    - name
    - cloudCredentialsType
    - status
    - scope
    - provider
  ApiPagination:
    properties:
      first:
        readOnly: true
        type: string
      last:
        readOnly: true
        type: string
      next:
        readOnly: true
        type: string
      prev:
        readOnly: true
        type: string
  AclRoleForeignKey:
    properties:
      id:
        description: Unique identifier for this ACL Role object.
        type: string
    required:
    - id
    x-derived:
      $ref: '#/definitions/AclRole'
    x-references:
      $ref: '#/definitions/AclRole'
  ComposedTeamIdentity:
    properties:
      id:
        description: Unique identifier for a Team.
        type: integer
      name:
        description: Team name.
        readOnly: true
        type: string
    required:
    - id
  VmwareCloudCredentials:
    properties:
      cloudCredentialsType:
        description: The Cloud Platform these credentials allow access to.
        enum:
        - AwsCloudCredentials
        - GceCloudCredentials
        - AzureCloudCredentials
        - CloudstackCloudCredentials
        - OpenstackCloudCredentials
        - RackspaceCloudCredentials
        - VmwareCloudCredentials
        type: string
      description:
        type: string
      id:
        description: Unique identifier for this Cloud Credentials object.
        maxLength: 12
        minLength: 12
        pattern: '[A-Fa-f0-9]+'
        readOnly: true
        type: string
      name:
        description: Unique name of these Cloud Credentials.
        type: string
      password:
        description: The password for the user.
        format: password
        type: string
      provider:
        description: Cloud provider for Openstack or Cloudstack based clouds.
        type: string
      scope:
        description: The scope in which these Cloud Credentials were added.
        enum:
        - scalr
        - account
        - environment
        - farm
        - farmrole
        - role
        - server
        readOnly: true
        type: string
      sslVerification:
        description: Specifies whether it should verify SSL Certificate.
        type: boolean
      status:
        description: The status of these Cloud Credentials.
        enum:
        - disabled
        - enabled
        - suspended
        readOnly: true
        type: string
      url:
        description: vSphere Web Services SDK Server URL.
        type: string
      userName:
        description: The ID of the user.
        type: string
    required:
    - name
    - cloudCredentialsType
    - url
    - userName
    - password
    x-abstractType:
      $ref: '#/definitions/CloudCredentials'
    x-createOnly:
    - cloudCredentialsType
    - provider
    x-discriminator: cloudCredentialsType
    x-filterable:
    - id
