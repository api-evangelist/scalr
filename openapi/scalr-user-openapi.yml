      description: Cloud specifics Farm Role configuration. This property is available
        only for Azure and AWS based Farm Roles. Please note, that the value is required
        for AzureConfiguration.
    networking:
      $ref: '#/definitions/NetworkConfiguration'
      description: Farm Role network configuration. Please note that this property
        is not available for AWS Farm Roles that weren't launched inside Amazon VPC.
