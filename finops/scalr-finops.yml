specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Scalr
providerId: scalr
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Terraform
  - GitOps
description: 'FOCUS-aligned FinOps for Scalr: Terraform / OpenTofu remote-operations platform
  billed on monthly runs, with unlimited users and resources included. Cost levers are run
  consumption (deduplication, drift-detection cadence) and tier choice (Business vs Enterprise
  commitment).'
sources:
  - https://www.scalr.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Scalr, Inc.
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Scalr
  ServiceCategory: Developer Tools
  ProviderName: Scalr
  PublisherName: Scalr, Inc.
  InvoiceIssuerName: Scalr, Inc.
  BillingCurrency: USD
meters:
  - name: terraform_runs
    unit: run
    aggregation: sum
    dimensions:
      - workspace
      - environment
      - account
  - name: drift_detection_runs
    unit: run
    aggregation: sum
    dimensions:
      - workspace
      - schedule
  - name: self_hosted_agents
    unit: agent
    aggregation: max
    dimensions:
      - account
principles:
  - name: Visibility
    description: Track Terraform run counts per workspace and environment in the Scalr
      UI; export run history for monthly reconciliation against the Scalr invoice.
  - name: Allocation
    description: Use Scalr environments and workspace ownership metadata to attribute runs
      to teams or applications; tag downstream cloud resources via Terraform for cross-platform
      chargeback.
  - name: Optimization
    description: Reduce billable runs by tightening drift-detection cadence, using plan-only
      runs for CI checks, batching changes, and consolidating workspaces where ownership
      allows. Reserve Enterprise commitment for predictable workloads ≥20K runs/year.
  - name: Accountability
    description: Assign a workspace owner per environment; review monthly run counts against
      the Business or Enterprise commitment and resize commitment annually.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
