specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Scalr
providerId: scalr
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Terraform
  - OpenTofu
  - Rate Limiting
description: Scalr offers a JSON:API-style REST API for managing workspaces, runs, modules,
  and policies. Rate limits are not centrally documented on the public Scalr pricing or
  docs landing pages reachable in this reconciliation pass; consumers should treat 429 responses
  as authoritative and follow standard exponential-backoff guidance. Plan-level concurrency
  is described by Scalr as "unlimited" on Business and Enterprise.
sources:
  - https://www.scalr.com/pricing
  - https://docs.scalr.io/
notes: Public rate-limit values for the Scalr API were not reachable in this reconciliation
  pass; this artifact records the policy surface only and should be revisited when Scalr
  publishes per-endpoint rate limits.
responseCodes:
  throttled: 429
limits:
  - name: API rate limits
    scope: account
    metric: varies
    limit: 'not centrally published; honor 429 responses'
    notes: Concurrency and runs are billed (not throttled) on Scalr; HTTP 429 responses
      should be honored where they appear.
policies:
  - name: Authentication
    description: Scalr API uses bearer-token authentication issued from the Scalr UI.
  - name: Backoff on 429
    description: Clients should implement exponential backoff with jitter on HTTP 429 responses.
  - name: Concurrency
    description: Scalr advertises unlimited concurrency on Business and Enterprise plans;
      runs are billed monthly rather than rate-throttled.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
